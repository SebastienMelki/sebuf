openapi: 3.1.0
info:
    title: Multi API
    description: Origin-level bundle spanning multiple services.
    contact:
        name: API Team
        email: api@example.com
    license:
        name: Apache-2.0
        url: https://www.apache.org/licenses/LICENSE-2.0
    version: 2.0.0
servers:
    - url: https://api.example.com
    - url: https://staging.example.com
paths:
    /api/v1/users/create:
        post:
            tags:
                - UserService
            summary: CreateUser
            description: Create user
            operationId: CreateUser
            parameters:
                - name: X-User-Token
                  in: header
                  description: User authentication token
                  required: true
                  schema:
                    type: string
                    format: uuid
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/multi_User'
                required: true
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/multi_User'
                "400":
                    description: Validation error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationError'
                default:
                    description: Error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /api/v1/users/get:
        post:
            tags:
                - UserService
            summary: GetUser
            description: Get user
            operationId: GetUser
            parameters:
                - name: X-User-Token
                  in: header
                  description: User authentication token
                  required: true
                  schema:
                    type: string
                    format: uuid
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/multi_Request'
                required: true
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/multi_User'
                "400":
                    description: Validation error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationError'
                default:
                    description: Error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /api/v1/users/update:
        post:
            tags:
                - UserService
            summary: UpdateUser
            description: Update user
            operationId: UpdateUser
            parameters:
                - name: X-User-Token
                  in: header
                  description: User authentication token
                  required: true
                  schema:
                    type: string
                    format: uuid
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/multi_User'
                required: true
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/multi_User'
                "400":
                    description: Validation error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationError'
                default:
                    description: Error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /api/v1/admin/users/list:
        post:
            tags:
                - AdminService
            summary: ListUsers
            description: List all users (admin only)
            operationId: ListUsers
            parameters:
                - name: X-Admin-Token
                  in: header
                  description: Admin authentication token
                  required: true
                  schema:
                    type: string
                    format: uuid
                - name: X-Admin-Role
                  in: header
                  description: Admin role level
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/multi_Request'
                required: true
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/multi_Response'
                "400":
                    description: Validation error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationError'
                default:
                    description: Error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /api/v1/admin/users/delete:
        post:
            tags:
                - AdminService
            summary: DeleteUser
            description: Delete user (admin only)
            operationId: DeleteUser
            parameters:
                - name: X-Admin-Role
                  in: header
                  description: Admin role level
                  required: true
                  schema:
                    type: string
                - name: X-Admin-Token
                  in: header
                  description: Admin authentication token
                  required: true
                  schema:
                    type: string
                    format: uuid
                - name: X-Confirmation-Token
                  in: header
                  description: Confirmation token for destructive operations
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/multi_Request'
                required: true
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/multi_Response'
                "400":
                    description: Validation error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationError'
                default:
                    description: Error response
                    content:
                        application/json:
                            schema:
