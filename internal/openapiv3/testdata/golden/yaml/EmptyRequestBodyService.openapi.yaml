openapi: 3.1.0
info:
    title: EmptyRequestBodyService API
    version: 1.0.0
paths:
    /api/v1/ping:
        post:
            tags:
                - EmptyRequestBodyService
            summary: Ping
            description: Ping sends an empty JSON body over POST.
            operationId: Ping
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/PingRequest'
                required: true
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/PingResponse'
                "400":
                    description: Validation error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationError'
                default:
                    description: Error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /api/v1/no-args:
        get:
            tags:
                - EmptyRequestBodyService
            summary: NoArgs
            description: NoArgs is a GET endpoint that takes no parameters.
            operationId: NoArgs
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/NoArgsResponse'
                "400":
                    description: Validation error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationError'
                default:
                    description: Error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
components:
    schemas:
        Error:
            type: object
            properties:
                message:
                    type: string
                    description: Error message (e.g., 'user not found', 'database connection failed')
            description: Error is returned when a handler encounters an error. It contains a simple error message that the developer can customize.
        FieldViolation:
            type: object
            properties:
                field:
                    type: string
                    description: The field path that failed validation (e.g., 'user.email' for nested fields). For header validation, this will be the header name (e.g., 'X-API-Key')
                description:
                    type: string
                    description: Human-readable description of the validation violation (e.g., 'must be a valid email address', 'required field missing')
            required:
                - field
                - description
            description: FieldViolation describes a single validation error for a specific field.
        ValidationError:
            type: object
            properties:
                violations:
                    type: array
                    items:
                        $ref: '#/components/schemas/FieldViolation'
                    description: List of validation violations
            required:
                - violations
            description: ValidationError is returned when request validation fails. It contains a list of field violations describing what went wrong.
        PingRequest:
            type: object
            description: PingRequest carries no fields. It is still sent as a JSON request body.
        PingResponse:
            type: object
            properties:
                status:
                    type: string
            description: PingResponse is returned by Ping.
        NoArgsRequest:
            type: object
            description: |-
                NoArgsRequest carries no fields and is used by a GET endpoint that takes no
                 input.
        NoArgsResponse:
            type: object
            properties:
                value:
                    type: string
            description: NoArgsResponse is returned by NoArgs.
