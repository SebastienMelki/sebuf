# Buf code generation configuration v2
version: v2

# Managed mode - automatically manages go_package options
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/SebastienMelki/sebuf/examples/enum-encoding/api
    - file_option: go_package_prefix
      module: buf.build/sebmelki/sebuf
      value: ""

plugins:
  - local: protoc-gen-go
    out: ./api
    opt: module=github.com/SebastienMelki/sebuf/examples/enum-encoding/api

  - local: ../../bin/protoc-gen-go-http
    out: api
    opt:
      - module=github.com/SebastienMelki/sebuf/examples/enum-encoding/api
      - generate_mock=false
