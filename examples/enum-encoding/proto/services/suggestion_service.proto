syntax = "proto3";

package suggestion.v1;

import "sebuf/http/annotations.proto";

// RiskLevel rates a suggestion. The enum_value annotations control the JSON
// wire format: the server emits "low"/"medium"/"high" (not RISK_LEVEL_LOW).
enum RiskLevel {
  // Default unset value. No enum_value annotation -> serializes as the proto name.
  RISK_LEVEL_UNSPECIFIED = 0;
  // Lower chance of a full loss; easier to profit.
  RISK_LEVEL_LOW = 1 [(sebuf.http.enum_value) = "low"];
  // Balanced bet; moderate chance of a full loss.
  RISK_LEVEL_MEDIUM = 2 [(sebuf.http.enum_value) = "medium"];
  // Bigger reward; higher chance of a full loss.
  RISK_LEVEL_HIGH = 3 [(sebuf.http.enum_value) = "high"];
}

// EasyOptionSuggestion is a single curated buy-to-open suggestion.
message EasyOptionSuggestion {
  string symbol = 1;
  double probability_of_profit = 2;
  // Singular enum -> "low"
  RiskLevel risk_level = 3;
  // Repeated enum -> ["low", "high"]
  repeated RiskLevel alternate_risk_levels = 4;
  // Map with enum values -> {"AAPL": "low", "TSLA": "high"}
  map<string, RiskLevel> risk_by_symbol = 5;
}

message GetSuggestionRequest {
  string symbol = 1;
  // Echoes the requested risk level back, proving request parsing accepts "low".
  RiskLevel requested_risk = 2;
}

// SuggestionService serves curated option suggestions.
service SuggestionService {
  option (sebuf.http.service_config) = {base_path: "/api/v1"};

  rpc GetSuggestion(GetSuggestionRequest) returns (EasyOptionSuggestion) {
    option (sebuf.http.config) = {
      path: "/suggestion"
      method: HTTP_METHOD_POST
    };
  }
}
